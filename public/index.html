<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서비스 현황</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 40px;
    }
    header h1 {
      font-size: 1.4rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 4px;
    }
    header p {
      font-size: 0.8rem;
      color: #475569;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
      gap: 14px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #1a1f2e;
      border: 1px solid #1e293b;
      border-radius: 14px;
      padding: 22px 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      transition: transform 0.15s, border-color 0.15s;
      text-decoration: none;
    }
    .card:hover {
      transform: translateY(-3px);
      border-color: #334155;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-icon {
      font-size: 1.8rem;
      line-height: 1;
    }
    .status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-dot.up   { background: #22c55e; box-shadow: 0 0 8px #22c55e88; }
    .status-dot.down { background: #ef4444; }
    .status-dot.loading { background: #475569; animation: blink 1s infinite; }

    @keyframes blink { 50% { opacity: 0.3; } }

    .card-name {
      font-size: 1rem;
      font-weight: 600;
      color: #f1f5f9;
    }

    .card-meta {
      display: flex;
      align-items: center;
      justify-content: space-between;
      font-size: 0.75rem;
    }
    .port-badge {
      background: #0f172a;
      border: 1px solid #1e293b;
      color: #64748b;
      padding: 3px 9px;
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.78rem;
    }
    .latency {
      color: #475569;
      font-size: 0.72rem;
    }
    .latency.fast { color: #22c55e; }
    .latency.slow { color: #f59e0b; }

    .go-btn {
      display: block;
      text-align: center;
      padding: 9px;
      background: #1e293b;
      border-radius: 8px;
      color: #94a3b8;
      font-size: 0.8rem;
      font-weight: 500;
      text-decoration: none;
      transition: background 0.15s, color 0.15s;
    }
    .card:hover .go-btn {
      background: #6366f1;
      color: white;
    }
    .go-btn.disabled {
      opacity: 0.3;
      pointer-events: none;
    }

    .refresh-btn {
      display: block;
      margin: 28px auto 0;
      padding: 8px 20px;
      background: transparent;
      border: 1px solid #1e293b;
      border-radius: 8px;
      color: #475569;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, color 0.2s;
    }
    .refresh-btn:hover { border-color: #334155; color: #94a3b8; }

    .updated {
      text-align: center;
      font-size: 0.7rem;
      color: #334155;
      margin-top: 10px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏠 서비스 현황</h1>
    <p id="subtitle">확인 중...</p>
  </header>

  <div class="grid" id="grid">
    <!-- cards rendered by JS -->
  </div>

  <button class="refresh-btn" onclick="load()">↻ 새로고침</button>
  <p class="updated" id="updated"></p>

  <script>
    async function load() {
      document.getElementById('subtitle').textContent = '확인 중...';
      renderSkeleton();
      const res = await fetch('/api/services');
      const services = await res.json();
      render(services);
      const now = new Date().toLocaleTimeString('ko-KR');
      document.getElementById('updated').textContent = `마지막 확인: ${now}`;
      const up = services.filter(s => s.status === 'up').length;
      document.getElementById('subtitle').textContent = `${up} / ${services.length} 서비스 정상`;
    }

    function renderSkeleton() {
      // keep existing cards but set loading dots
      document.querySelectorAll('.status-dot').forEach(d => {
        d.className = 'status-dot loading';
      });
    }

    function render(services) {
      const grid = document.getElementById('grid');
      grid.innerHTML = services.map(s => {
        const isUp = s.status === 'up';
        const ms = s.ms;
        let latencyText = isUp ? `${ms}ms` : '응답없음';
        let latencyClass = ms < 200 ? 'fast' : ms < 800 ? 'slow' : '';

        return `
          <div class="card">
            <div class="card-top">
              <span class="card-icon">${s.icon || '🔧'}</span>
              <span class="status-dot ${s.status}"></span>
            </div>
            <div class="card-name">${s.name}</div>
            <div class="card-meta">
              <span class="port-badge">:${s.port}</span>
              <span class="latency ${latencyClass}">${latencyText}</span>
            </div>
            <a href="${s.url}" target="_blank" class="go-btn ${isUp ? '' : 'disabled'}">
              ${isUp ? '바로가기 →' : '오프라인'}
            </a>
          </div>
        `;
      }).join('');
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
