<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NAS Port Dashboard</title>
  <meta name="description" content="NAS 서비스 포트 관리 대시보드 - Docker 컨테이너 및 시스템 포트 실시간 모니터링" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <!-- Background particles -->
  <div class="bg-particles" id="bgParticles"></div>

  <!-- Header -->
  <header class="header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="brand-icon">
          <svg width="28" height="28" viewBox="0 0 28 28" fill="none">
            <rect x="2" y="2" width="10" height="10" rx="2" fill="#6366f1"/>
            <rect x="16" y="2" width="10" height="10" rx="2" fill="#8b5cf6" opacity="0.7"/>
            <rect x="2" y="16" width="10" height="10" rx="2" fill="#8b5cf6" opacity="0.7"/>
            <rect x="16" y="16" width="10" height="10" rx="2" fill="#6366f1" opacity="0.5"/>
          </svg>
        </div>
        <div>
          <h1 class="brand-title">NAS Port Dashboard</h1>
          <p class="brand-subtitle">Port Management Console</p>
        </div>
      </div>
      <div class="header-actions">
        <div class="connection-badge" id="connectionBadge">
          <span class="status-dot" id="statusDot"></span>
          <span id="statusText">연결 중...</span>
        </div>
        <button class="btn-refresh" id="btnRefresh" onclick="manualRefresh()">
          <svg class="refresh-icon" id="refreshIcon" width="16" height="16" viewBox="0 0 16 16" fill="none">
            <path d="M13.65 2.35A8 8 0 1 0 15 8h-2a6 6 0 1 1-1.06-3.35L10 6h5V1l-1.35 1.35z" fill="currentColor"/>
          </svg>
          새로고침
        </button>
        <div class="last-updated" id="lastUpdated">--</div>
      </div>
    </div>
  </header>

  <!-- Main -->
  <main class="main">

    <!-- Stats bar -->
    <section class="stats-grid" id="statsGrid">
      <div class="stat-card" id="statSystem">
        <div class="stat-icon stat-icon--blue">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M3 4a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V4zm0 6a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v2a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1v-2zm0 6a1 1 0 0 1 1-1h4a1 1 0 0 1 0 2H4a1 1 0 0 1-1-1z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <div class="stat-value" id="statSystemCount">-</div>
          <div class="stat-label">시스템 포트</div>
        </div>
      </div>
      <div class="stat-card" id="statDocker">
        <div class="stat-icon stat-icon--purple">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M2 10a8 8 0 1 1 16 0 8 8 0 0 1-16 0zm9-5.5v3h3v2h-3v3H9v-3H6V7.5h3v-3h2z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <div class="stat-value" id="statDockerCount">-</div>
          <div class="stat-label">Docker 컨테이너</div>
        </div>
      </div>
      <div class="stat-card" id="statPorts">
        <div class="stat-icon stat-icon--green">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 2a8 8 0 1 0 0 16A8 8 0 0 0 10 2zm0 2a6 6 0 1 1 0 12A6 6 0 0 1 10 4zm0 2a1 1 0 0 0-1 1v4l3 2 .75-1.25-2.25-1.5V7a1 1 0 0 0-1-1z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <div class="stat-value" id="statPortCount">-</div>
          <div class="stat-label">총 매핑 포트</div>
        </div>
      </div>
      <div class="stat-card" id="statEvents">
        <div class="stat-icon stat-icon--orange">
          <svg width="20" height="20" viewBox="0 0 20 20" fill="none">
            <path d="M10 2a1 1 0 0 1 .894.553l7 14A1 1 0 0 1 17 18H3a1 1 0 0 1-.894-1.447l7-14A1 1 0 0 1 10 2zm0 3.618L4.764 16h10.472L10 5.618zM9 12V9h2v3H9zm0 2h2v2H9v-2z" fill="currentColor"/>
          </svg>
        </div>
        <div>
          <div class="stat-value" id="statEventCount">0</div>
          <div class="stat-label">Docker 이벤트</div>
        </div>
      </div>
    </section>

    <!-- Filter / Search bar -->
    <section class="filter-bar">
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 16 16" fill="none">
          <path d="M11.742 10.344a6.5 6.5 0 1 0-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 0 0 1.415-1.414l-3.85-3.85a1.007 1.007 0 0 0-.115-.099zm-5.242 1.656a5.5 5.5 0 1 1 0-11 5.5 5.5 0 0 1 0 11z" fill="currentColor"/>
        </svg>
        <input type="text" id="searchInput" class="search-input" placeholder="포트, 서비스, 컨테이너 이름으로 검색..." oninput="applyFilters()" />
      </div>
      <div class="filter-tabs" role="tablist">
        <button class="filter-tab active" id="tabAll" onclick="setTab('all')" role="tab">전체</button>
        <button class="filter-tab" id="tabDocker" onclick="setTab('docker')" role="tab">Docker</button>
        <button class="filter-tab" id="tabSystem" onclick="setTab('system')" role="tab">시스템</button>
      </div>
      <div class="proto-filters">
        <button class="proto-chip active" id="chipAll" onclick="setProto('all')">ALL</button>
        <button class="proto-chip proto-chip--tcp" id="chipTcp" onclick="setProto('TCP')">TCP</button>
        <button class="proto-chip proto-chip--udp" id="chipUdp" onclick="setProto('UDP')">UDP</button>
      </div>
    </section>

    <!-- Content grid -->
    <div class="content-grid">
      <!-- Port table -->
      <section class="card table-card">
        <div class="card-header">
          <h2 class="card-title">포트 목록</h2>
          <span class="card-badge" id="tableCount">-</span>
        </div>
        <div class="table-wrap">
          <table class="port-table" id="portTable">
            <thead>
              <tr>
                <th onclick="sortTable('port')">포트 <span class="sort-arrow">↕</span></th>
                <th onclick="sortTable('proto')">프로토콜</th>
                <th onclick="sortTable('service')">서비스</th>
                <th onclick="sortTable('type')">타입</th>
                <th onclick="sortTable('name')">컨테이너 / 프로세스</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="portTableBody">
              <tr><td colspan="6" class="empty-state">
                <div class="spinner"></div>
                <p>데이터 불러오는 중...</p>
              </td></tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- Right panel -->
      <aside class="right-panel">
        <!-- Docker Containers -->
        <section class="card">
          <div class="card-header">
            <h2 class="card-title">Docker 컨테이너</h2>
            <span class="card-badge" id="containerCount">-</span>
          </div>
          <div id="containerList" class="container-list">
            <div class="loading-placeholder">
              <div class="spinner"></div>
            </div>
          </div>
        </section>

        <!-- Live Events -->
        <section class="card events-card">
          <div class="card-header">
            <h2 class="card-title">실시간 Docker 이벤트</h2>
            <div class="live-badge">
              <span class="live-dot"></span>LIVE
            </div>
          </div>
          <div id="eventFeed" class="event-feed">
            <div class="event-empty">이벤트 대기 중...</div>
          </div>
        </section>
      </aside>
    </div>
  </main>

  <!-- Toast notifications -->
  <div id="toastContainer" class="toast-container"></div>

  <script src="app.js"></script>
</body>
</html>
