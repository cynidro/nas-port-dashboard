<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>홈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    h1 {
      font-size: 0.75rem;
      font-weight: 500;
      color: #334155;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 20px;
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: repeat(2, 100px); }
    }

    /* ── 앱 카드 ── */
    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .icon-wrap {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      background: #1a1f2e;
      border: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      position: relative;
      transition: transform 0.12s, box-shadow 0.12s;
      user-select: none;
    }
    .app:active .icon-wrap { transform: scale(0.93); }
    .app:hover .icon-wrap  { box-shadow: 0 8px 24px rgba(0,0,0,0.4); border-color: #2d3748; }

    /* 미설정 카드 - 점선 테두리 */
    .icon-wrap.unconfigured {
      border-style: dashed;
      border-color: #334155;
      background: #13182200;
    }
    /* 설정하기 뱃지 */
    .setup-badge {
      position: absolute;
      bottom: -6px;
      background: #6366f1;
      color: white;
      font-size: 0.55rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 999px;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    /* 상태 점 */
    .dot {
      position: absolute;
      top: 7px; right: 7px;
      width: 9px; height: 9px;
      border-radius: 50%;
      border: 2px solid #1a1f2e;
    }
    .dot.up   { background: #22c55e; }
    .dot.down { background: #ef4444; }

    .app-name {
      font-size: 0.72rem;
      font-weight: 500;
      color: #94a3b8;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100px;
    }
    .app-name.dim { color: #475569; }

    .updated {
      margin-top: 40px;
      font-size: 0.65rem;
      color: #1e293b;
    }

    /* ── 설정 모달 ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.show { display: flex; }

    .modal {
      background: #1a1f2e;
      border: 1px solid #1e293b;
      border-radius: 20px 20px 0 0;
      padding: 28px 24px 36px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.22s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-title {
      font-size: 0.75rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .modal-raw {
      font-size: 0.85rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 20px;
      font-family: monospace;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 0.72rem;
      color: #475569;
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      background: #0f1117;
      border: 1px solid #1e293b;
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      outline: none;
    }
    .field input:focus { border-color: #6366f1; }
    #emojiInput { font-size: 1.6rem; text-align: center; }

    .modal-btns {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    .btn {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-save   { background: #6366f1; color: white; }
    .btn-hide   { background: #1e293b; color: #64748b; }
    .btn-cancel { background: transparent; color: #475569; border: 1px solid #1e293b; }

    /* ── 앱 포트 표시 ── */
    .app-port {
      font-size: 0.65rem;
      font-weight: 500;
      color: #64748b;
      font-family: monospace;
      margin-top: -3px;
    }

    /* ── 액션 시트 (iOS 스타일 바텀 시트) ── */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      backdrop-filter: blur(8px);
      z-index: 110;
      align-items: flex-end;
      justify-content: center;
    }
    .sheet-overlay.show {
      display: flex;
    }

    .sheet {
      background: #1a1f2e;
      border: 1px solid #1e293b;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 480px;
      padding: 24px 24px 34px;
      animation: sheetUp 0.28s cubic-bezier(0.16, 1, 0.3, 1);
      box-shadow: 0 -10px 40px rgba(0, 0, 0, 0.5);
    }
    @keyframes sheetUp {
      from { transform: translateY(100%); }
      to   { transform: translateY(0); }
    }

    .sheet-header {
      display: flex;
      align-items: center;
      gap: 16px;
      padding-bottom: 20px;
      border-bottom: 1px solid #1e293b;
      margin-bottom: 16px;
    }
    .sheet-icon {
      font-size: 2.8rem;
      width: 72px;
      height: 72px;
      background: #10141f;
      border: 1px solid #1e293b;
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sheet-info {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .sheet-title {
      font-size: 1.1rem;
      font-weight: 600;
      color: #f1f5f9;
    }
    .sheet-desc {
      font-size: 0.75rem;
      color: #64748b;
      font-family: monospace;
    }

    .sheet-btns {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .sheet-btn {
      width: 100%;
      padding: 14px;
      border-radius: 14px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.15s, transform 0.1s;
    }
    .sheet-btn:active {
      transform: scale(0.98);
    }
    .sheet-btn-primary {
      background: #6366f1;
      color: white;
    }
    .sheet-btn-primary:hover {
      background: #4f46e5;
    }
    .sheet-btn-secondary {
      background: #242b3d;
      color: #cbd5e1;
      border: 1px solid #2e374d;
    }
    .sheet-btn-secondary:hover {
      background: #2e374d;
    }
    .sheet-btn-danger {
      background: #7f1d1d;
      color: #fca5a5;
      border: 1px solid #991b1b;
    }
    .sheet-btn-danger:hover {
      background: #991b1b;
      color: white;
    }
    .sheet-btn-cancel {
      background: transparent;
      color: #64748b;
      border: 1px solid #1e293b;
      margin-top: 4px;
    }
    .sheet-btn-cancel:hover {
      background: #161b26;
    }
  </style>
</head>
<body>
  <h1>서비스</h1>
  <div class="grid" id="grid"></div>
  <p class="updated" id="updated"></p>

  <!-- 설정 모달 -->
  <div class="overlay" id="overlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-title">새 서비스 발견됨</div>
      <div class="modal-raw" id="modalRaw"></div>

      <div class="field">
        <label>이모지</label>
        <input id="emojiInput" type="text" maxlength="4" placeholder="🔧" />
      </div>
      <div class="field">
        <label>표시 이름</label>
        <input id="nameInput" type="text" placeholder="서비스 이름" />
      </div>

      <div class="modal-btns" style="flex-wrap: wrap;">
        <button class="btn btn-save"   onclick="saveLabel()" style="flex: 1;">저장</button>
        <button class="btn btn-hide"   onclick="hideService()" style="flex: 1;">숨기기</button>
        <button class="btn btn-cancel" onclick="closeModal()" style="flex: 1;">취소</button>
        <button class="btn" onclick="deleteContainerFromModal()" style="flex-basis: 100%; margin-top: 8px; background: #7f1d1d; color: #fca5a5; border: 1px solid #991b1b;">도커 컨테이너 종료 및 삭제</button>
      </div>
    </div>
  </div>

  <!-- 액션 시트 (바텀 시트) -->
  <div class="sheet-overlay" id="sheetOverlay" onclick="closeSheet(event)">
    <div class="sheet">
      <div class="sheet-header">
        <div class="sheet-icon" id="sheetIcon">❓</div>
        <div class="sheet-info">
          <div class="sheet-title" id="sheetTitle">서비스 이름</div>
          <div class="sheet-desc" id="sheetDesc">rawName • :0000</div>
        </div>
      </div>
      <div class="sheet-btns">
        <button class="sheet-btn sheet-btn-primary" id="sheetOpenBtn" onclick="openServiceFromSheet()">
          🔗 서비스 바로가기
        </button>
        <button class="sheet-btn sheet-btn-secondary" onclick="editServiceFromSheet()">
          ⚙️ 이름 및 이모지 설정
        </button>
        <button class="sheet-btn sheet-btn-danger" onclick="deleteServiceFromSheet()">
          🗑️ 도커 컨테이너 종료 및 삭제
        </button>
        <button class="sheet-btn sheet-btn-cancel" onclick="closeSheet()">
          취소
        </button>
      </div>
    </div>
  </div>

  <script>
    const nas = window.location.hostname;
    let currentRaw = null;
    let currentId = null;
    let activeService = null;
    let longPressTimer = null;
    let isLongPress = false;

    async function load() {
      try {
        const res  = await fetch('/api/services');
        const list = await res.json();
        render(list);
        document.getElementById('updated').textContent =
          new Date().toLocaleTimeString('ko-KR');
      } catch {
        document.getElementById('grid').innerHTML =
          `<p style="color:#ef4444;font-size:.8rem;grid-column:1/-1">연결 오류</p>`;
      }
    }

    function render(services) {
      document.getElementById('grid').innerHTML = services.map(s => {
        const dataAttrs = `data-id="${s.id}" data-rawname="${s.rawName}" data-name="${s.name}" data-icon="${s.icon}" data-port="${s.port}" data-running="${s.running}" data-configured="${s.configured}"`;

        if (!s.configured) {
          return `
            <div class="app card-item" ${dataAttrs}>
              <div class="icon-wrap unconfigured">
                ${s.icon}
                <span class="setup-badge">설정하기</span>
                <span class="dot ${s.running ? 'up' : 'down'}"></span>
              </div>
              <span class="app-name dim">${s.name}</span>
              <span class="app-port">:${s.port}</span>
            </div>`;
        }
        return `
          <a class="app card-item" href="http://${nas}:${s.port}" target="_blank" ${dataAttrs}>
            <div class="icon-wrap">
              ${s.icon}
              <span class="dot ${s.running ? 'up' : 'down'}"></span>
            </div>
            <span class="app-name">${s.name}</span>
            <span class="app-port">:${s.port}</span>
          </a>`;
      }).join('');

      bindCardEvents();
    }

    function bindCardEvents() {
      const cards = document.querySelectorAll('.card-item');
      cards.forEach(card => {
        // 1. 우클릭 방지 및 우클릭 시 액션 시트 열기
        card.addEventListener('contextmenu', (e) => {
          e.preventDefault();
          const id = card.getAttribute('data-id');
          const rawName = card.getAttribute('data-rawname');
          const name = card.getAttribute('data-name');
          const icon = card.getAttribute('data-icon');
          const port = card.getAttribute('data-port');
          const running = card.getAttribute('data-running') === 'true';
          const configured = card.getAttribute('data-configured') === 'true';
          openActionSheet({ id, rawName, name, icon, port, running, configured });
        });

        // 2. 모바일 터치 길게 누르기 지원
        card.addEventListener('touchstart', () => {
          isLongPress = false;
          longPressTimer = setTimeout(() => {
            isLongPress = true;
            const id = card.getAttribute('data-id');
            const rawName = card.getAttribute('data-rawname');
            const name = card.getAttribute('data-name');
            const icon = card.getAttribute('data-icon');
            const port = card.getAttribute('data-port');
            const running = card.getAttribute('data-running') === 'true';
            const configured = card.getAttribute('data-configured') === 'true';
            openActionSheet({ id, rawName, name, icon, port, running, configured });
          }, 600);
        }, { passive: true });

        card.addEventListener('touchend', (e) => {
          if (longPressTimer) {
            clearTimeout(longPressTimer);
          }
          if (isLongPress) {
            e.preventDefault();
          }
        });

        card.addEventListener('touchmove', () => {
          if (longPressTimer) {
            clearTimeout(longPressTimer);
          }
        }, { passive: true });

        // 3. 일반 클릭 제어 (미설정인 경우 설정창 열기)
        card.addEventListener('click', (e) => {
          if (isLongPress) {
            e.preventDefault();
            isLongPress = false;
            return;
          }
          const configured = card.getAttribute('data-configured') === 'true';
          if (!configured) {
            e.preventDefault();
            const rawName = card.getAttribute('data-rawname');
            const id = card.getAttribute('data-id');
            const name = card.getAttribute('data-name');
            const icon = card.getAttribute('data-icon');
            openModal(rawName, id, name, icon);
          }
        });
      });
    }

    // ── 모달 ──────────────────────────────────
    function openModal(rawName, id, currentName = '', currentEmoji = '') {
      currentRaw = rawName;
      currentId = id;
      document.getElementById('modalRaw').textContent   = rawName;
      document.getElementById('emojiInput').value = currentEmoji === '❓' ? '' : currentEmoji;
      document.getElementById('nameInput').value  = currentName || rawName;
      document.getElementById('overlay').classList.add('show');
      document.getElementById('emojiInput').focus();
    }

    function closeModal(e) {
      if (e && e.target !== document.getElementById('overlay')) return;
      document.getElementById('overlay').classList.remove('show');
      currentRaw = null;
      currentId = null;
    }

    async function saveLabel() {
      const icon = document.getElementById('emojiInput').value.trim() || '🔧';
      const name = document.getElementById('nameInput').value.trim() || currentRaw;
      await fetch('/api/labels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rawName: currentRaw, icon, name }),
      });
      document.getElementById('overlay').classList.remove('show');
      load();
    }

    async function hideService() {
      await fetch('/api/labels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rawName: currentRaw, exclude: true }),
      });
      document.getElementById('overlay').classList.remove('show');
      load();
    }

    // ── 액션 시트 ──────────────────────────────────
    function openActionSheet(s) {
      activeService = s;
      document.getElementById('sheetIcon').textContent = s.icon;
      document.getElementById('sheetTitle').textContent = s.name;
      document.getElementById('sheetDesc').textContent = `${s.rawName} • :${s.port}`;
      
      const openBtn = document.getElementById('sheetOpenBtn');
      if (s.running) {
        openBtn.style.display = 'flex';
      } else {
        openBtn.style.display = 'none';
      }

      document.getElementById('sheetOverlay').classList.add('show');
    }

    function closeSheet(e) {
      if (e && e.target !== document.getElementById('sheetOverlay')) return;
      document.getElementById('sheetOverlay').classList.remove('show');
      activeService = null;
    }

    function openServiceFromSheet() {
      if (activeService) {
        window.open(`http://${nas}:${activeService.port}`, '_blank');
        closeSheet();
      }
    }

    function editServiceFromSheet() {
      if (activeService) {
        const s = activeService;
        closeSheet();
        openModal(s.rawName, s.id, s.name, s.icon);
      }
    }

    async function deleteServiceFromSheet() {
      if (!activeService) return;
      const confirmMsg = `⚠️ 경고: [${activeService.name}] (포트 :${activeService.port}) 컨테이너를 정말로 강제 종료하고 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`;
      if (confirm(confirmMsg)) {
        const id = activeService.id;
        const rawName = activeService.rawName;
        closeSheet();
        await deleteContainerAPI(id, rawName);
      }
    }

    async function deleteContainerFromModal() {
      if (!currentRaw) return;
      const confirmMsg = `⚠️ 경고: [${currentRaw}] 컨테이너를 정말로 강제 종료하고 삭제하시겠습니까?\n\n이 작업은 되돌릴 수 없습니다.`;
      if (confirm(confirmMsg)) {
        const id = currentId;
        const rawName = currentRaw;
        closeModal();
        await deleteContainerAPI(id, rawName);
      }
    }

    async function deleteContainerAPI(id, rawName) {
      try {
        const res = await fetch(`/api/containers/${id}?rawName=${encodeURIComponent(rawName)}`, {
          method: 'DELETE'
        });
        const data = await res.json();
        if (data.ok) {
          alert('컨테이너가 성공적으로 종료 및 삭제되었습니다.');
          load();
        } else {
          alert(`삭제 실패: ${data.error}`);
        }
      } catch (err) {
        alert(`네트워크 오류: ${err.message}`);
      }
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
