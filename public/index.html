<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>홈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    h1 {
      font-size: 0.75rem;
      font-weight: 500;
      color: #334155;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 20px;
    }
    @media (max-width: 380px) {
      .grid { grid-template-columns: repeat(2, 100px); }
    }

    /* ── 앱 카드 ── */
    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
      cursor: pointer;
    }
    .icon-wrap {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      background: #1a1f2e;
      border: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      position: relative;
      transition: transform 0.12s, box-shadow 0.12s;
      user-select: none;
    }
    .app:active .icon-wrap { transform: scale(0.93); }
    .app:hover .icon-wrap  { box-shadow: 0 8px 24px rgba(0,0,0,0.4); border-color: #2d3748; }

    /* 미설정 카드 - 점선 테두리 */
    .icon-wrap.unconfigured {
      border-style: dashed;
      border-color: #334155;
      background: #13182200;
    }
    /* 설정하기 뱃지 */
    .setup-badge {
      position: absolute;
      bottom: -6px;
      background: #6366f1;
      color: white;
      font-size: 0.55rem;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 999px;
      white-space: nowrap;
      letter-spacing: 0.04em;
    }

    /* 상태 점 */
    .dot {
      position: absolute;
      top: 7px; right: 7px;
      width: 9px; height: 9px;
      border-radius: 50%;
      border: 2px solid #1a1f2e;
    }
    .dot.up   { background: #22c55e; }
    .dot.down { background: #ef4444; }

    .app-name {
      font-size: 0.72rem;
      font-weight: 500;
      color: #94a3b8;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100px;
    }
    .app-name.dim { color: #475569; }

    .updated {
      margin-top: 40px;
      font-size: 0.65rem;
      color: #1e293b;
    }

    /* ── 설정 모달 ── */
    .overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(6px);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .overlay.show { display: flex; }

    .modal {
      background: #1a1f2e;
      border: 1px solid #1e293b;
      border-radius: 20px 20px 0 0;
      padding: 28px 24px 36px;
      width: 100%;
      max-width: 480px;
      animation: slideUp 0.22s ease-out;
    }
    @keyframes slideUp {
      from { transform: translateY(40px); opacity: 0; }
      to   { transform: translateY(0);    opacity: 1; }
    }

    .modal-title {
      font-size: 0.75rem;
      color: #475569;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }
    .modal-raw {
      font-size: 0.85rem;
      font-weight: 600;
      color: #f1f5f9;
      margin-bottom: 20px;
      font-family: monospace;
    }

    .field { margin-bottom: 14px; }
    .field label {
      display: block;
      font-size: 0.72rem;
      color: #475569;
      margin-bottom: 5px;
    }
    .field input {
      width: 100%;
      padding: 10px 12px;
      background: #0f1117;
      border: 1px solid #1e293b;
      border-radius: 10px;
      color: #f1f5f9;
      font-size: 0.88rem;
      font-family: 'Inter', sans-serif;
      outline: none;
    }
    .field input:focus { border-color: #6366f1; }
    #emojiInput { font-size: 1.6rem; text-align: center; }

    .modal-btns {
      display: flex;
      gap: 8px;
      margin-top: 18px;
    }
    .btn {
      flex: 1;
      padding: 11px;
      border-radius: 10px;
      border: none;
      font-family: 'Inter', sans-serif;
      font-size: 0.85rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.8; }
    .btn-save   { background: #6366f1; color: white; }
    .btn-hide   { background: #1e293b; color: #64748b; }
    .btn-cancel { background: transparent; color: #475569; border: 1px solid #1e293b; }
  </style>
</head>
<body>
  <h1>서비스</h1>
  <div class="grid" id="grid"></div>
  <p class="updated" id="updated"></p>

  <!-- 설정 모달 -->
  <div class="overlay" id="overlay" onclick="closeModal(event)">
    <div class="modal">
      <div class="modal-title">새 서비스 발견됨</div>
      <div class="modal-raw" id="modalRaw"></div>

      <div class="field">
        <label>이모지</label>
        <input id="emojiInput" type="text" maxlength="4" placeholder="🔧" />
      </div>
      <div class="field">
        <label>표시 이름</label>
        <input id="nameInput" type="text" placeholder="서비스 이름" />
      </div>

      <div class="modal-btns">
        <button class="btn btn-save"   onclick="saveLabel()">저장</button>
        <button class="btn btn-hide"   onclick="hideService()">숨기기</button>
        <button class="btn btn-cancel" onclick="closeModal()">취소</button>
      </div>
    </div>
  </div>

  <script>
    const nas = window.location.hostname;
    let currentRaw = null;

    async function load() {
      try {
        const res  = await fetch('/api/services');
        const list = await res.json();
        render(list);
        document.getElementById('updated').textContent =
          new Date().toLocaleTimeString('ko-KR');
      } catch {
        document.getElementById('grid').innerHTML =
          `<p style="color:#ef4444;font-size:.8rem;grid-column:1/-1">연결 오류</p>`;
      }
    }

    function render(services) {
      document.getElementById('grid').innerHTML = services.map(s => {
        if (!s.configured) {
          // 미설정 → 점선 카드, 클릭하면 모달
          return `
            <div class="app" onclick="openModal('${s.rawName}')">
              <div class="icon-wrap unconfigured">
                ${s.icon}
                <span class="setup-badge">설정하기</span>
                <span class="dot ${s.running ? 'up' : 'down'}"></span>
              </div>
              <span class="app-name dim">${s.name}</span>
            </div>`;
        }
        // 설정된 서비스 → 바로가기 링크
        return `
          <a class="app" href="http://${nas}:${s.port}" target="_blank">
            <div class="icon-wrap">
              ${s.icon}
              <span class="dot ${s.running ? 'up' : 'down'}"></span>
            </div>
            <span class="app-name">${s.name}</span>
          </a>`;
      }).join('');
    }

    // ── 모달 ──────────────────────────────────
    function openModal(rawName) {
      currentRaw = rawName;
      document.getElementById('modalRaw').textContent   = rawName;
      document.getElementById('emojiInput').value = '';
      document.getElementById('nameInput').value  = rawName;
      document.getElementById('overlay').classList.add('show');
      document.getElementById('emojiInput').focus();
    }
    function closeModal(e) {
      if (e && e.target !== document.getElementById('overlay')) return;
      document.getElementById('overlay').classList.remove('show');
      currentRaw = null;
    }

    async function saveLabel() {
      const icon = document.getElementById('emojiInput').value.trim() || '🔧';
      const name = document.getElementById('nameInput').value.trim() || currentRaw;
      await fetch('/api/labels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rawName: currentRaw, icon, name }),
      });
      document.getElementById('overlay').classList.remove('show');
      load();
    }

    async function hideService() {
      await fetch('/api/labels', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ rawName: currentRaw, exclude: true }),
      });
      document.getElementById('overlay').classList.remove('show');
      load();
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
