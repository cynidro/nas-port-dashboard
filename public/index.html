<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>서비스 현황</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 40px 20px;
    }

    header {
      text-align: center;
      margin-bottom: 36px;
    }
    h1 { font-size: 1.3rem; font-weight: 600; margin-bottom: 4px; }
    #subtitle { font-size: 0.78rem; color: #475569; }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(210px, 1fr));
      gap: 12px;
      max-width: 900px;
      margin: 0 auto;
    }

    .card {
      background: #161b27;
      border: 1px solid #1e293b;
      border-radius: 12px;
      padding: 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-top {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .card-name {
      font-size: 0.95rem;
      font-weight: 600;
      color: #f1f5f9;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 130px;
    }
    .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .dot.up   { background: #22c55e; box-shadow: 0 0 6px #22c55e88; }
    .dot.down { background: #ef4444; }

    .image-name {
      font-size: 0.72rem;
      color: #334155;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* 포트 링크 목록 */
    .ports { display: flex; flex-direction: column; gap: 5px; }

    .port-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 7px 10px;
      background: #0f1117;
      border: 1px solid #1e293b;
      border-radius: 7px;
      text-decoration: none;
      transition: border-color 0.15s, background 0.15s;
    }
    .port-link:hover {
      border-color: #6366f1;
      background: #1e1b4b22;
    }
    .port-num {
      font-family: monospace;
      font-size: 0.85rem;
      color: #6366f1;
      font-weight: 600;
    }
    .go {
      font-size: 0.72rem;
      color: #475569;
    }
    .port-link:hover .go { color: #818cf8; }

    /* 오프라인 */
    .offline-badge {
      font-size: 0.72rem;
      color: #ef4444;
      padding: 7px 10px;
      background: #0f1117;
      border: 1px solid #1e293b;
      border-radius: 7px;
      text-align: center;
    }

    .refresh-btn {
      display: block;
      margin: 28px auto 0;
      padding: 8px 20px;
      background: transparent;
      border: 1px solid #1e293b;
      border-radius: 8px;
      color: #475569;
      font-size: 0.78rem;
      cursor: pointer;
      font-family: 'Inter', sans-serif;
      transition: border-color 0.2s, color 0.2s;
    }
    .refresh-btn:hover { border-color: #334155; color: #94a3b8; }

    .updated {
      text-align: center;
      font-size: 0.68rem;
      color: #1e293b;
      margin-top: 10px;
    }

    .error {
      text-align: center;
      color: #ef4444;
      font-size: 0.85rem;
      margin-top: 40px;
    }
  </style>
</head>
<body>
  <header>
    <h1>🏠 서비스 현황</h1>
    <p id="subtitle">불러오는 중...</p>
  </header>

  <div class="grid" id="grid"></div>
  <button class="refresh-btn" onclick="load()">↻ 새로고침</button>
  <p class="updated" id="updated"></p>

  <script>
    const host = window.location.hostname; // NAS IP 자동 감지

    async function load() {
      try {
        const res = await fetch('/api/services');
        if (!res.ok) throw new Error(await res.text());
        const services = await res.json();
        render(services);
        const up = services.filter(s => s.running).length;
        document.getElementById('subtitle').textContent = `${up} / ${services.length} 실행 중`;
        document.getElementById('updated').textContent = `마지막 확인: ${new Date().toLocaleTimeString('ko-KR')}`;
      } catch (e) {
        document.getElementById('grid').innerHTML = `<p class="error">Docker 소켓 연결 실패<br><small>${e.message}</small></p>`;
        document.getElementById('subtitle').textContent = '오류';
      }
    }

    function render(services) {
      document.getElementById('grid').innerHTML = services.map(s => {
        const portLinks = s.ports.map(port =>
          `<a class="port-link" href="http://${host}:${port}" target="_blank">
            <span class="port-num">:${port}</span>
            <span class="go">바로가기 →</span>
          </a>`
        ).join('');

        return `
          <div class="card">
            <div class="card-top">
              <span class="card-name" title="${s.name}">${s.name}</span>
              <span class="dot ${s.running ? 'up' : 'down'}"></span>
            </div>
            <div class="image-name">${s.image}</div>
            <div class="ports">
              ${s.running ? portLinks : '<div class="offline-badge">오프라인</div>'}
            </div>
          </div>
        `;
      }).join('');
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
