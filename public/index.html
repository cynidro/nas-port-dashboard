<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>홈</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 24px;
    }

    h1 {
      font-size: 0.8rem;
      font-weight: 500;
      color: #334155;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 32px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 20px;
    }

    @media (max-width: 380px) {
      .grid { grid-template-columns: repeat(2, 100px); }
    }

    .app {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }

    .icon-wrap {
      width: 100px;
      height: 100px;
      border-radius: 22px;
      background: #1a1f2e;
      border: 1px solid #1e293b;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.6rem;
      position: relative;
      transition: transform 0.12s, box-shadow 0.12s;
    }
    .app:active .icon-wrap {
      transform: scale(0.93);
    }
    .app:hover .icon-wrap {
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
      border-color: #2d3748;
    }

    /* 상태 점 */
    .status-dot {
      position: absolute;
      top: 7px; right: 7px;
      width: 9px; height: 9px;
      border-radius: 50%;
      border: 2px solid #1a1f2e;
    }
    .status-dot.up   { background: #22c55e; }
    .status-dot.down { background: #ef4444; }

    .app-name {
      font-size: 0.72rem;
      font-weight: 500;
      color: #94a3b8;
      text-align: center;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 100px;
    }

    /* 로딩 스켈레톤 */
    .skeleton .icon-wrap {
      background: #1e293b;
      animation: shimmer 1.2s infinite;
    }
    @keyframes shimmer {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }

    .updated {
      margin-top: 40px;
      font-size: 0.65rem;
      color: #1e293b;
    }
  </style>
</head>
<body>
  <h1>서비스</h1>
  <div class="grid" id="grid"></div>
  <p class="updated" id="updated"></p>

  <script>
    const host = window.location.hostname;

    async function load() {
      try {
        const res = await fetch('/api/services');
        const services = await res.json();
        render(services);
        document.getElementById('updated').textContent =
          new Date().toLocaleTimeString('ko-KR');
      } catch (e) {
        document.getElementById('grid').innerHTML =
          `<p style="color:#ef4444;font-size:.8rem;grid-column:1/-1">연결 오류</p>`;
      }
    }

    function render(services) {
      document.getElementById('grid').innerHTML = services.map(s => `
        <a class="app" href="http://${host}:${s.port}" target="_blank">
          <div class="icon-wrap">
            ${s.icon}
            <span class="status-dot ${s.running ? 'up' : 'down'}"></span>
          </div>
          <span class="app-name">${s.name}</span>
        </a>
      `).join('');
    }

    load();
    setInterval(load, 30000);
  </script>
</body>
</html>
