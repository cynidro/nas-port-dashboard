services:
  port-dashboard:
    build: .
    container_name: port-dashboard
    restart: unless-stopped

    # host 네트워크 = ss로 NAS 시스템 포트 전부 볼 수 있음
    network_mode: host

    volumes:
      # Docker 소켓 마운트 = 다른 컨테이너 정보 읽기
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      - PORT=3001          # ← 원하는 포트로 바꾸세요
      - POLL_INTERVAL=30000
      - TZ=Asia/Seoul

    # 선택: 로그 크기 제한
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
