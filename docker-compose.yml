services:
  port-dashboard:
    build: .
    container_name: port-dashboard
    restart: unless-stopped
    ports:
      - "3001:3001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./labels.json:/app/labels.json   # 아이콘/이름/제외 설정
    environment:
      - PORT=3001
      - TZ=Asia/Seoul
